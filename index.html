<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speak Tamil Fast</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .app {
      width: 100%;
      max-width: 400px;
      min-height: 600px;
      background: #16213e;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
    }
    .screen.active {
      display: flex;
    }
    h1 {
      text-align: center;
      color: #e94560;
      font-size: 2rem;
      margin-bottom: 10px;
    }
    h2 {
      text-align: center;
      color: #e94560;
      font-size: 1.5rem;
      margin-bottom: 20px;
    }
    .subtitle {
      text-align: center;
      color: #a0a0a0;
      margin-bottom: 40px;
    }
    .btn {
      background: #e94560;
      color: #fff;
      border: none;
      padding: 15px 30px;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px auto;
      width: 80%;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #c73e54;
    }
    .btn-back {
      background: #0f3460;
      margin-bottom: 20px;
    }
    .card {
      background: #1f4068;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .card h3 {
      color: #e94560;
      margin-bottom: 5px;
    }
    .card p {
      color: #a0a0a0;
      font-size: 0.9rem;
    }
    .phrase-item {
      background: #1f4068;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .phrase-item .english {
      color: #fff;
      font-size: 1.1rem;
      margin-bottom: 8px;
    }
    .phrase-item .tamil {
      color: #e94560;
      font-size: 1.3rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="home" class="screen active">
      <h1>Speak Tamil Fast</h1>
      <p class="subtitle">Learn essential Tamil phrases quickly</p>
      <button class="btn" onclick="showScreen('categories')">Start</button>
    </div>

    <div id="categories" class="screen">
      <button class="btn btn-back" onclick="showScreen('home')">Back</button>
      <h2>Categories</h2>
      <div class="card" onclick="showScreen('shopping')" style="cursor:pointer;">
        <h3>Shopping</h3>
        <p>Phrases for markets and stores</p>
      </div>
      <div class="card" style="cursor:not-allowed;opacity:0.5;">
        <h3>Travel</h3>
        <p>Coming soon</p>
      </div>
      <div class="card" style="cursor:not-allowed;opacity:0.5;">
        <h3>Daily Talk</h3>
        <p>Coming soon</p>
      </div>
    </div>

    <div id="shopping" class="screen">
      <button class="btn btn-back" onclick="showScreen('categories')">Back</button>
      <h2>Shopping</h2>
      <div class="phrase-item">
        <div class="english">How much is this?</div>
        <div class="tamil">Idhu evlo?</div>
      </div>
      <div class="phrase-item">
        <div class="english">Too expensive</div>
        <div class="tamil">Romba costly</div>
      </div>
      <div class="phrase-item">
        <div class="english">I want to buy this</div>
        <div class="tamil">Inga vanguren</div>
      </div>
      <div class="phrase-item">
        <div class="english">Discount please</div>
        <div class="tamil">Kallam kedu</div>
      </div>
    </div>
  </div>

  <script>
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
  </script>
</body>
</html>
